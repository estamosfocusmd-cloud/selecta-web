<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <!-- "Select" text in dark color -->
  <text x="0" y="42" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="48" fill="#0F1720" letter-spacing="-2">Select</text>
  <!-- Custom "A" shape with integrated checkmark -->
  <!-- A left stroke -->
  <path d="M168 42 L182 6 L196 42" stroke="#0F1720" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- A crossbar -->
  <line x1="173" y1="29" x2="191" y2="29" stroke="#0F1720" stroke-width="5.5" stroke-linecap="round"/>
  <!-- Checkmark extending from top of A -->
  <path d="M182 6 L193 20 L214 -2" stroke="#00C2A8" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
